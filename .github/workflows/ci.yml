## ==================================================================
## CI/CD - Voice Synth Frontend (vai no repo: voice-synth-frontend)
## ==================================================================
## Copie este arquivo para: voice-synth-frontend/.github/workflows/ci.yml
##
## ⚠️ ATENÇÃO: O frontend usa variáveis NEXT_PUBLIC_* em BUILD TIME.
## O build final contém as URLs "hardcoded" no JavaScript.
## As variáveis OIDC_*, NEXTAUTH_* são runtime (server-side)
## e são injetadas via docker-compose environment no deploy.
## ==================================================================

name: CI/CD - Voice Synth Frontend

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/voice-synth-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_AUTH_API_URL=${{ vars.APP_BASE_URL }}/api
            NEXT_PUBLIC_VOICE_API_URL=${{ vars.APP_BASE_URL }}/voice-api
            NEXT_PUBLIC_APP_NAME=Voice Synth AI
            NEXT_PUBLIC_APP_URL=${{ vars.APP_BASE_URL }}/voice-app

      - name: Trigger deploy
        if: github.event_name == 'push'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          repository: ${{ github.repository_owner }}/deploy
          event-type: deploy-voice-synth-frontend
          client-payload: '{"sha": "${{ github.sha }}", "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"}'
